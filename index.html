<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <title>Weather App</title>
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>

    <div class="card">
        <div class="search">
            <input type="text" id="input" placeholder="Enter City Name" spellcheck="false">
            <button id="search-btn"><i data-feather="search"></i></button>
        </div>
        <div class="error">
            <p>City not found</p>
            <p>make sure the writing is correct</p>
        </div>
        <div class="weather">
            <img src="assets/clear.png" class="weather-icon">
            <h1 class="temp">22°C</h1>
            <h2 class="condition">Cloudy</h2>
            <p class="country">Jakarta, Indonesia</p>
            <div class="details">
                <div class="col">
                    <img src="assets/humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="assets/wind.png">
                    <div>
                        <p class="wind">18 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>
        feather.replace(); 
    </script>
    <script src="script.js"></script>

</body>

</html>
